name: Uptime CI
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
jobs:
  uptime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: upptime/uptime-monitor@v1.41.0
        with:
          command: "uptime"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          NOTIFICATIONS_EMAIL_ADDRESS: philip@quickler.co
